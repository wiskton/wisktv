<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo2.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #091880;
      font-family: 'Bebas Neue', sans-serif;
    }

    .screen {
      background: linear-gradient(160deg, #1a3fd4 0%, #0d25a0 60%, #091880 100%);
      border: 3px solid #e8c000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: linear-gradient(90deg, #0a1e8a 0%, #1535c0 50%, #0a1e8a 100%);
      border-bottom: 3px solid #e8c000;
      gap: 10px;
    }

    .logo-igortv {
      width: 100px;
      height: 100px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #e8c000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-igortv img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title-block {
      background: linear-gradient(90deg, #1a8a1a, #2db82d);
      padding: 6px 20px 6px 10px;
      clip-path: polygon(0 0, 97% 0, 100% 100%, 0 100%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-main {
      font-size: 32px;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 2px 2px #000, -1px -1px #000;
      font-style: italic;
      white-space: nowrap;
    }

    .speed-lines {
      height: 4px;
      background: linear-gradient(90deg, #e8c000, transparent);
      margin-top: 3px;
      border-radius: 2px;
    }

    .header-right {
      text-align: right;
      line-height: 1.15;
      flex-shrink: 0;
    }

    .iss-label {
      font-size: 8px;
      color: #90b8ff;
      letter-spacing: 1px;
      display: block;
    }

    .deluxe-label {
      font-size: 20px;
      color: #60aaff;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #4488ff;
      display: block;
    }

    .tm {
      font-size: 9px;
      vertical-align: super;
    }

    /* SECTION TABS */
    .sections {
      display: flex;
      gap: 0;
      padding: 8px 8px 0;
    }

    .sec-tab {
      padding: 5px 18px;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      border: 2px solid #e8c000;
      border-bottom: none;
      background: #0d1f80;
      color: #90b8ff;
      transition: background 0.2s;
    }

    .sec-tab.active {
      background: #1535c8;
      color: #f0d000;
    }

    /* TABLE AREA */
    .content {
      padding: 0 8px 8px;
      flex: 1;
    }

    .table-view {
      display: none;
    }

    .table-view.active {
      display: block;
    }



    /* Table common */
    .trow {
      display: grid;
      border: 1px solid #e8c000;
      border-bottom: none;
    }

    .trow.header-row {
      background: #0d1f80;
    }

    .trow.header-row .cell {
      color: #fff;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 2px;
      text-align: center;
      border-right: 1px solid #e8c000;
    }

    .trow.header-row .cell:last-child {
      border-right: none;
    }

    .trow.header-row .cell.cname {
      text-align: left;
      padding-left: 6px;
    }

    .trow.data-row {
      background: #1535c8;
      border: 1px solid #3355cc;
      border-bottom: none;
      min-height: 23px;
      align-items: center;
    }

    .trow.data-row:nth-child(even) {
      background: #1830d8;
    }

    .trow.data-row:hover {
      background: #2244dd;
    }

    .trow.data-row .cell {
      padding: 3px 2px;
      font-size: 11px;
      text-align: center;
      border-right: 1px solid #2a44bb;
      color: #f0d000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trow.data-row .cell:last-child {
      border-right: none;
    }

    .trow.data-row .cell.cpos {
      font-weight: bold;
    }

    .trow.data-row .cell.cname {
      text-align: left;
      justify-content: flex-start;
      padding-left: 4px;
      gap: 5px;
      color: #fff;
      font-size: 11px;
    }

    .trow.data-row.empty .cell {
      color: #3350bb;
    }

    .trow.data-row.last-row {
      border-bottom: 1px solid #3355cc;
    }

    /* Artilharia: 4 cols */
    .art-cols {
      grid-template-columns: 42px 1fr 46px 46px;
    }

    /* Classificação: 8 cols */
    .cls-cols {
      grid-template-columns: 42px 1fr 38px 38px 38px 38px 38px 50px;
    }

    /* FOOTER */
    .footer {
      border-top: 2px solid #e8c000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      background: #0d1f80;
    }

    .footer-text {
      font-size: 9px;
      color: #e8c000;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="screen">

    <div class="header">
      <div class="logo-igortv">
        <img src="logo2.png" alt="IgorTV" />
      </div>
      <div class="title-center">
        <div class="title-block">
          <img src="logo.png" alt="Logo" style="width:50px;height:50px;" />
          <div>
            <div class="title-main">IgorTV CUP - 1ª Edição</div>
            <div class="speed-lines"></div>
          </div>
        </div>
      </div>
      <div class="header-right">
        <span class="iss-label">INTERNATIONAL</span>
        <span class="iss-label">SUPER STAR SOCCER</span>
        <span class="deluxe-label">DELUXE<span class="tm">™</span></span>
      </div>
    </div>

    <div class="sections">
      <div class="sec-tab active" onclick="showTab('art')">⚽ ARTILHARIA</div>
      <div class="sec-tab" onclick="showTab('cls')">🏆 CLASSIFICAÇÃO</div>
    </div>

    <div class="content">
      <!-- ARTILHARIA -->
      <div class="table-view active" id="tab-art">
        <div id="art-root"></div>
      </div>
      <!-- CLASSIFICAÇÃO -->
      <div class="table-view" id="tab-cls">
        <div id="cls-root"></div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">⚽ &nbsp; INTERNATIONAL SUPERSTAR SOCCER DELUXE — WiskTV &nbsp; ⚽</span>
    </div>
  </div>

  <script>
    const raw = [
      { name: 'Will', jogos: 6, v: 4, e: 0, d: 2, pts: 12, gols: 23, ptsb: 18 },
      { name: 'Lê', jogos: 5, v: 4, e: 0, d: 1, pts: 12, gols: 17, ptsb: 17 },
      { name: 'Mendes', jogos: 5, v: 3, e: 0, d: 2, pts: 9, gols: 13, ptsb: 14 },
      { name: 'Celo', jogos: 3, v: 3, e: 0, d: 0, pts: 9, gols: 5, ptsb: 12 },
      { name: 'Igor', jogos: 6, v: 3, e: 0, d: 3, pts: 9, gols: 1, ptsb: 15 },
      { name: 'Pedrin', jogos: 4, v: 2, e: 0, d: 2, pts: 6, gols: 11, ptsb: 10 },
      { name: 'Fábio', jogos: 4, v: 3, e: 0, d: 1, pts: 6, gols: 7, ptsb: 10 },
      { name: 'P2', jogos: 3, v: 2, e: 0, d: 1, pts: 6, gols: 6, ptsb: 9 },
      { name: 'Vitera', jogos: 2, v: 2, e: 0, d: 0, pts: 6, gols: 5, ptsb: 8 },
      { name: 'Luiz', jogos: 2, v: 2, e: 0, d: 0, pts: 6, gols: 3, ptsb: 8 },
      { name: 'Pedrão', jogos: 3, v: 2, e: 0, d: 1, pts: 6, gols: 2, ptsb: 9 },
      { name: 'Nill', jogos: 4, v: 2, e: 0, d: 2, pts: 6, gols: 0, ptsb: 10 },
      { name: 'Luis', jogos: 3, v: 2, e: 0, d: 1, pts: 6, gols: 0, ptsb: 9 },
      { name: 'Boy', jogos: 4, v: 1, e: 0, d: 3, pts: 3, gols: 23, ptsb: 7 },
      { name: 'Wesley', jogos: 5, v: 1, e: 0, d: 4, pts: 3, gols: 12, ptsb: 8 },
      { name: 'Ronin', jogos: 7, v: 1, e: 0, d: 6, pts: 3, gols: 6, ptsb: 10 },
      { name: 'Jackson', jogos: 2, v: 1, e: 0, d: 1, pts: 3, gols: 4, ptsb: 5 },
      { name: 'Lucas', jogos: 3, v: 1, e: 0, d: 2, pts: 3, gols: 3, ptsb: 6 },
      { name: 'Caio', jogos: 1, v: 1, e: 0, d: 0, pts: 3, gols: 3, ptsb: 4 },
      { name: 'Welinton', jogos: 1, v: 1, e: 0, d: 0, pts: 3, gols: 3, ptsb: 4 },
      { name: 'Francis', jogos: 4, v: 1, e: 0, d: 3, pts: 3, gols: 1, ptsb: 7 },
      { name: 'Tchelo', jogos: 3, v: 1, e: 0, d: 2, pts: 3, gols: 1, ptsb: 6 },
      { name: 'Shitake', jogos: 2, v: 0, e: 0, d: 2, pts: 0, gols: 2, ptsb: 2 },
      { name: 'Brunim', jogos: 1, v: 0, e: 0, d: 1, pts: 0, gols: 1, ptsb: 1 },
      { name: 'Luiz Gatti', jogos: 1, v: 0, e: 0, d: 1, pts: 0, gols: 0, ptsb: 1 },
    ];

    // Artilharia: ordenar por gols desc
    const artilharia = [...raw].sort((a, b) => b.gols - a.gols || b.pts - a.pts);
    // Classificação: ordenar por pontos desc, desempate vitórias, gols
    const classificacao = [...raw].sort((a, b) => b.pts - a.pts || b.v - a.v || b.gols - a.gols);

    const TOTAL_ART = artilharia.length;
    const TOTAL_CLS = classificacao.length;

    function posColor(pos, total) {
      const t = (pos - 1) / (total - 1);
      if (t < 0.33) return '#60ff60';
      else if (t < 0.55) return '#f0d000';
      else if (t < 0.78) return '#ffffff';
      else return '#ff5040';
    }

    function brazilFlag() {
      return `<svg width="20" height="13" viewBox="0 0 22 15" xmlns="http://www.w3.org/2000/svg">
    <rect width="22" height="15" fill="#009c3b"/>
    <polygon points="11,1.5 20.5,7.5 11,13.5 1.5,7.5" fill="#FFDF00"/>
    <circle cx="11" cy="7.5" r="3.2" fill="#002776"/>
    <path d="M8 7.2 Q11 5.5 14 7.2" stroke="#fff" stroke-width="0.9" fill="none"/>
  </svg>`;
    }

    // ---- ARTILHARIA ----
    function buildArtCol(list, maxRows) {
      let html = `<div class="col-block">
    <div class="trow header-row art-cols">
      <div class="cell">POS</div>
      <div class="cell cname">JOGADOR</div>
      <div class="cell">JGS</div>
      <div class="cell">GOLS</div>
    </div>`;
      for (let i = 0; i < maxRows; i++) {
        const isLast = i === maxRows - 1;
        const lc = isLast ? ' last-row' : '';
        if (i < list.length) {
          const p = list[i];
          const pc = posColor(p._pos, TOTAL_ART);
          html += `<div class="trow data-row art-cols${lc}">
        <div class="cell cpos" style="color:${pc}">${p._pos}º</div>
        <div class="cell cname">${brazilFlag()} ${p.name.toUpperCase()}</div>
        <div class="cell">${p.jogos}</div>
        <div class="cell">${p.gols}</div>
      </div>`;
        } else {
          html += `<div class="trow data-row empty art-cols${lc}">
        <div class="cell">-</div><div class="cell cname">-</div>
        <div class="cell">-</div><div class="cell">-</div>
      </div>`;
        }
      }
      return html + '</div>';
    }

    artilharia.forEach((p, i) => p._pos = i + 1);
    document.getElementById('art-root').innerHTML =
      buildArtCol(artilharia, artilharia.length);

    // ---- CLASSIFICAÇÃO ----
    classificacao.forEach((p, i) => p._cpos = i + 1);
    let clsHtml = `<div class="col-block">
  <div class="trow header-row cls-cols">
    <div class="cell">POS</div>
    <div class="cell cname">JOGADOR</div>
    <div class="cell">JGS</div>
    <div class="cell">V</div>
    <div class="cell">E</div>
    <div class="cell">D</div>
    <div class="cell">PTS</div>
    <div class="cell">PTS BÔNUS</div>
  </div>`;
    classificacao.forEach((p, i) => {
      const isLast = i === classificacao.length - 1;
      const lc = isLast ? ' last-row' : '';
      const pc = posColor(p._cpos, TOTAL_CLS);
      clsHtml += `<div class="trow data-row cls-cols${lc}">
    <div class="cell cpos" style="color:${pc}">${p._cpos}º</div>
    <div class="cell cname">${brazilFlag()} ${p.name.toUpperCase()}</div>
    <div class="cell">${p.jogos}</div>
    <div class="cell">${p.v}</div>
    <div class="cell">${p.e}</div>
    <div class="cell">${p.d}</div>
    <div class="cell" style="color:#7fff7f;font-size:12px">${p.pts}</div>
    <div class="cell" style="color:#7fff7f;font-size:12px">${p.ptsb}</div>
  </div>`;
    });
    clsHtml += '</div>';
    document.getElementById('cls-root').innerHTML = clsHtml;

    function showTab(tab) {
      document.querySelectorAll('.table-view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.sec-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>

</html>
