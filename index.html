<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1230b0;
      font-family: 'Bebas Neue', sans-serif;
    }

    .screen {
      background: linear-gradient(160deg, #1a3fd4 0%, #0d25a0 60%, #091880 100%);
      border: 3px solid #e8c000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: linear-gradient(90deg, #0a1e8a 0%, #1535c0 50%, #0a1e8a 100%);
      border-bottom: 3px solid #e8c000;
      gap: 10px;
    }

    /* Logo IgorTV usando a imagem enviada */
    .logo-igortv {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e8c000;
    }

    .logo-igortv img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Título central */
    .title-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title-block {
      background: linear-gradient(90deg, #1a8a1a, #2db82d);
      padding: 6px 20px 6px 10px;
      clip-path: polygon(0 0, 97% 0, 100% 100%, 0 100%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-main {
      font-size: 24px;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 2px 2px #000, -1px -1px #000;
      font-style: italic;
      white-space: nowrap;
    }

    .speed-lines {
      height: 4px;
      background: linear-gradient(90deg, #e8c000, transparent);
      margin-top: 3px;
      border-radius: 2px;
    }

    /* ISS Deluxe brand */
    .header-right {
      text-align: right;
      line-height: 1.15;
      flex-shrink: 0;
    }

    .iss-label {
      font-size: 8px;
      color: #90b8ff;
      letter-spacing: 1px;
      display: block;
    }

    .deluxe-label {
      font-size: 22px;
      color: #60aaff;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #4488ff;
      display: block;
    }

    .tm {
      font-size: 9px;
      vertical-align: super;
    }

    /* TABLE */
    .table-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 8px;
      padding: 8px 8px 4px;
      flex: 1;
    }

    .trow {
      display: grid;
      border: 1px solid #e8c000;
      border-bottom: none;
    }

    .trow.view-artilharia,
    .trow.view-assistencias {
      grid-template-columns: 52px 1fr 56px 56px;
    }

    .trow.view-titulos {
      grid-template-columns: 48px 1fr 44px 44px 44px;
    }

    .trow.view-titulos.header-row .cell {
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .trow.view-titulos.data-row .cell {
      font-size: 11px;
    }

    .trow.view-pontos {
      grid-template-columns: 44px 1fr 28px 28px 28px 28px 44px;
    }

    .trow.view-pontos.header-row .cell {
      font-size: 10px;
      letter-spacing: 0.5px;
    }

    .trow.view-pontos.data-row .cell {
      font-size: 11px;
    }

    .trow.header-row {
      background: #0d1f80;
    }

    .trow.header-row .cell {
      color: #fff;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 2px;
      text-align: center;
      border-right: 1px solid #e8c000;
    }

    .trow.header-row .cell:last-child {
      border-right: none;
    }

    .trow.header-row .cell.cname {
      text-align: left;
      padding-left: 6px;
    }

    .trow.data-row {
      background: #1535c8;
      border: 1px solid #3355cc;
      border-bottom: none;
      min-height: 24px;
      align-items: center;
    }

    .trow.data-row:nth-child(even) {
      background: #1830d8;
    }

    .trow.data-row:hover {
      background: #2244dd;
    }

    .trow.data-row .cell {
      padding: 3px 2px;
      font-size: 12px;
      text-align: center;
      border-right: 1px solid #2a44bb;
      color: #f0d000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trow.data-row .cell:last-child {
      border-right: none;
    }

    .trow.data-row .cell.cpos {
      font-weight: bold;
    }

    .trow.data-row .cell.cname {
      text-align: left;
      justify-content: flex-start;
      padding-left: 4px;
      gap: 5px;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .trow.data-row.empty .cell {
      color: #3350bb;
    }

    .trow.data-row.last-row {
      border-bottom: 1px solid #3355cc;
    }

    /* FOOTER */
    .footer {

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      background: #0d1f80;
    }

    .footer-text {

      color: #e8c000;

    /* MENU BAR */
    .menu-bar {

      padding: 8px 12px;
      background: linear-gradient(180deg, #0a1c75 0%, #061250 100%);

    .menu-btn {

      border: 2px solid #e8c000;
      padding: 6px 16px;

      letter-spacing: 1.5px;
      text-shadow: 1px 1px #000;
      cursor: pointer;

      outline: none;
      min-width: 130px;
      text-align: center;
      transform: skewX(-8deg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .menu-btn svg {

      transform: skewX(8deg);
    }

    .menu-btn:hover {

      color: #e8c000;

</head>

    // Calcula dinamicamente a tabela de títulos somando as primeiras posições das edições finalizadas (concluded: true)
    function calculateTitulos() {
      const playerTitles = {};
      const allPlayersSet = new Set();

      // Coleta todos os jogadores de todas as edições
      Object.keys(championshipsData).forEach(champId => {
        const champ = championshipsData[champId];
        ['artilharia', 'assistencias', 'pontos'].forEach(category => {
          if (champ[category]) {
            champ[category].forEach(p => {
              if (p.name && p.name !== '-') {
                allPlayersSet.add(p.name);
              }
            });
          }
        });
      });

      // Inicializa os títulos para cada jogador encontrado
      allPlayersSet.forEach(name => {
        playerTitles[name] = { name, camp: 0, art: 0, ast: 0 };
      });

      // Soma os títulos das edições concluídas
      Object.keys(championshipsData).forEach(champId => {
        const champ = championshipsData[champId];
        if (champ.concluded) {
          // Pontos Corridos -> Campeonatos
          if (champ.pontos) {
            champ.pontos.forEach(p => {
              if (p.pos === 1 && playerTitles[p.name]) {
                playerTitles[p.name].camp += 1;
              }
            });
          }
          // Artilharia -> Artilheiro
          if (champ.artilharia) {
            champ.artilharia.forEach(p => {
              if (p.pos === 1 && playerTitles[p.name]) {
                playerTitles[p.name].art += 1;
              }
            });
          }
          // Assistências -> Assistência
          if (champ.assistencias) {
            champ.assistencias.forEach(p => {
              if (p.pos === 1 && playerTitles[p.name]) {
                playerTitles[p.name].ast += 1;
              }
            });
          }
        }
      });

      const list = Object.values(playerTitles);

      // Ordena por campeonatos desc, artilharia desc, assistências desc
      list.sort((a, b) => {
        if (b.camp !== a.camp) return b.camp - a.camp;
        if (b.art !== a.art) return b.art - a.art;
        return b.ast - a.ast;
      });

      // Atribui posições (com tratamento para empates idênticos)
      let currentPos = 1;
      for (let i = 0; i < list.length; i++) {
        if (i > 0) {
          const prev = list[i - 1];
          const curr = list[i];
          const hasSameStats = curr.camp === prev.camp && curr.art === prev.art && curr.ast === prev.ast;
          if (!hasSameStats) {
            currentPos = i + 1;
          }
        }
        list[i].pos = currentPos;
      }

      return list;
    }

          <line x1="13" y1="11" x2="9" y2="10" stroke="#000" stroke-width="1.5"/>
          <line x1="14" y1="14" x2="11" y2="18" stroke="#000" stroke-width="1.5"/>
          <line x1="18" y1="14" x2="21" y2="18" stroke="#000" stroke-width="1.5"/>
          <line x1="19" y1="11" x2="23" y2="10" stroke="#000" stroke-width="1.5"/>
        </svg>`;
      }
      if (viewName === 'assistencias') {
        return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" style="vertical-align: middle; margin-left: 6px;" xmlns="http://www.w3.org/2000/svg">
          <text x="2" y="26" font-size="24">👟</text>
        </svg>`;
      }
      if (viewName === 'pontos') {
        return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" style="vertical-align: middle; margin-left: 6px;" xmlns="http://www.w3.org/2000/svg">
          <polygon points="16,2 20,11 30,12 22,19 25,29 16,24 7,29 10,19 2,12 12,11" fill="#FFDF00" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
          <polygon points="16,5 18,12 25,13 19,18" fill="#FFF" opacity="0.5"/>
        </svg>`;
      }
      if (viewName === 'titulos') {
        return `<svg width="${size}" height="${size}" viewBox="0 0 32 32" style="vertical-align: middle; margin-left: 6px;" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="26" width="12" height="4" fill="#B89000" stroke="#000" stroke-width="2"/>
          <rect x="13" y="22" width="6" height="4" fill="#E8C000" stroke="#000" stroke-width="2"/>
          <path d="M8 8 L24 8 L22 22 L10 22 Z" fill="#FFDF00" stroke="#000" stroke-width="2"/>
          <path d="M8 10 C 4 10, 4 16, 10 16" fill="none" stroke="#000" stroke-width="2"/>
          <path d="M24 10 C 28 10, 28 16, 22 16" fill="none" stroke="#000" stroke-width="2"/>
          <polygon points="16,10 14,14 18,14" fill="#FFF"/>
        </svg>`;
      }
      return '';
    }

    function brazilFlag() {
      return `<svg width="22" height="15" viewBox="0 0 22 15" xmlns="http://www.w3.org/2000/svg">
    <rect width="22" height="15" fill="#009c3b"/>
    <polygon points="11,1.5 20.5,7.5 11,13.5 1.5,7.5" fill="#FFDF00"/>
    <circle cx="11" cy="7.5" r="3.2" fill="#002776"/>
    <path d="M8 7.2 Q11 5.5 14 7.2" stroke="#fff" stroke-width="0.9" fill="none"/>
  </svg>`;
    }

    function posColor(pos, total) {
      const t = (pos - 1) / (total - 1);
      if (t < 0.33) return '#60aaff';
      else if (t < 0.55) return '#f0d000';
      else if (t < 0.78) return '#ff5040';
      else return '#aaaaaa';
    }

    function makeRow(p, isLast, total, viewName) {
      const trophy = (p.pos === 1 && viewName !== 'titulos') ? getTrophyIcon(viewName, 18) : '';

      let columnsHtml = '';
      if (viewName === 'pontos') {
        columnsHtml = `
          <div class="cell">${p.J}</div>
          <div class="cell">${p.V}</div>
          <div class="cell">${p.E}</div>
          <div class="cell">${p.D}</div>
          <div class="cell" style="font-weight: bold; color: #FFF;">${p.PTS}</div>
        `;
      } else if (viewName === 'titulos') {
        columnsHtml = `
          <div class="cell">${p.camp}</div>
          <div class="cell">${p.art}</div>
          <div class="cell">${p.ast}</div>
        `;
      } else {
        columnsHtml = `
          <div class="cell">${p.val1}</div>
          <div class="cell">${p.val2}</div>
        `;
      }

      return `<div class="trow data-row view-${viewName}${isLast ? ' last-row' : ''}">
    <div class="cell cpos" style="color:${posColor(p.pos, total)}">${p.pos}º</div>
    <div class="cell cname">${brazilFlag()} ${p.name} ${trophy}</div>
    ${columnsHtml}
  </div>`;
    }

    function makeEmptyRow(isLast, viewName) {
      let columnsHtml = '';
      if (viewName === 'pontos') {
        columnsHtml = `
          <div class="cell">-</div>
          <div class="cell">-</div>
          <div class="cell">-</div>
          <div class="cell">-</div>
          <div class="cell">-</div>
        `;
      } else if (viewName === 'titulos') {
        columnsHtml = `
          <div class="cell">-</div>
          <div class="cell">-</div>
          <div class="cell">-</div>
        `;
      } else {
        columnsHtml = `
          <div class="cell">-</div>
          <div class="cell">-</div>
        `;
      }
      return `<div class="trow data-row empty view-${viewName}${isLast ? ' last-row' : ''}">
    <div class="cell cpos">-</div><div class="cell cname">-</div>
    ${columnsHtml}
  </div>`;
    }

    function buildCol(list, headerCol4, total, viewName) {
      let headerHtml = '';
      if (viewName === 'pontos') {
        headerHtml = `
          <div class="cell">POS</div>
          <div class="cell cname">JOGADOR</div>
          <div class="cell">J</div>
          <div class="cell">V</div>
          <div class="cell">E</div>
          <div class="cell">D</div>
          <div class="cell">PTS</div>
        `;
      } else if (viewName === 'titulos') {
        headerHtml = `
          <div class="cell">POS</div>
          <div class="cell cname">JOGADOR</div>
          <div class="cell" style="font-size: 14px;">🏆</div>
          <div class="cell" style="font-size: 14px;">⚽</div>
          <div class="cell" style="font-size: 14px;">👟</div>
        `;
      } else {
        headerHtml = `
          <div class="cell">POS</div>
          <div class="cell cname">JOGADOR</div>
          <div class="cell">JOGOS</div>
          <div class="cell">${headerCol4}</div>
        `;
      }

      let html = `<div class="col-block">
    <div class="trow header-row view-${viewName}">
      ${headerHtml}
    </div>`;
      for (let i = 0; i < MAX_ROWS; i++) {
        const isLast = i === MAX_ROWS - 1;
        html += i < list.length ? makeRow(list[i], isLast, total, viewName) : makeEmptyRow(isLast, viewName);
      }
      return html + '</div>';
    }

    function renderChampBar() {
      const bar = document.getElementById('champ-bar');
      let html = `<span class="bar-label">EDIÇÃO:</span>`;
      Object.keys(championshipsData).forEach(champId => {
        const champ = championshipsData[champId];
        const isActive = champId === activeChampId ? ' active' : '';
        html += `<button class="champ-btn${isActive}" data-champ="${champId}" onclick="switchChamp('${champId}')">${champ.name}</button>`;
      });
      bar.innerHTML = html;
    }

    function switchChamp(champId) {
      activeChampId = champId;
      const buttons = document.querySelectorAll('.champ-btn');
      buttons.forEach(btn => {
        if (btn.getAttribute('data-champ') === champId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      renderView(activeViewName);
    }

    function renderView(viewName) {
      activeViewName = viewName;

      // Oculta/Exibe seletor de campeonato
      if (viewName === 'titulos') {
        document.getElementById('champ-bar').style.display = 'none';
      } else {
        document.getElementById('champ-bar').style.display = 'flex';
      }

      const config = viewsConfig[viewName];
      document.getElementById('view-title').textContent = config.title;
      document.getElementById('view-icon').innerHTML = getTrophyIcon(viewName, 26);

      let list = [];
      if (viewName === 'titulos') {
        list = calculateTitulos();
      } else {
        list = championshipsData[activeChampId][viewName] || [];
      }

      const half = Math.ceil(list.length / 2);
      const total = list.length;

      document.getElementById('root').innerHTML =
        buildCol(list.slice(0, half), config.headerCol4, total, viewName) +
        buildCol(list.slice(half), config.headerCol4, total, viewName);
    }

    function switchView(viewName) {
      const buttons = document.querySelectorAll('.menu-btn');
      buttons.forEach(btn => {
        if (btn.getAttribute('data-view') === viewName) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      renderView(viewName);
    }

    // Inicializa a interface
    renderChampBar();
    renderView('artilharia');
  </script>
</body>

</html>
